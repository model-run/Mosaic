name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 20 (LTS): pnpm 8.15's self-installer (@pnpm/exe) crashes under
          # Node 18, and pnpm/action-setup runs it on this PATH Node. 20 also
          # satisfies the project's engines (node >=18) and Next 14 / React 18.
          node-version: '20'

      - name: Setup pnpm
        # No `version:` input — pnpm/action-setup@v4+ reads the version from
        # package.json's `packageManager` field (pnpm@8.15.0). Specifying both
        # errors with "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: |
          cd web
          pnpm install

      - name: Build project
        run: |
          cd web
          pnpm run build

      - name: Prepare GitHub Pages
        run: |
          # Create docs directory and copy built files
          mkdir -p docs
          cp -r web/out/* docs/
          
          # Ensure all necessary directories exist
          mkdir -p docs/_next/static/css docs/_next/static/chunks docs/assets/css docs/assets/js
          
          # Copy static assets to proper locations
          if [ -d "web/out/_next/static" ]; then
            cp -r web/out/_next/static/* docs/_next/static/
            echo "✅ Next.js static assets copied to docs/_next/static/"
          fi
          
          # Create fallback CSS and JS files if they don't exist
          if [ ! -f "docs/assets/css/style.css" ]; then
            echo "/* GitHub Pages CSS */" > docs/assets/css/style.css
          fi
          
          if [ ! -f "docs/assets/js/site.js" ]; then
            echo "/* GitHub Pages JS */" > docs/assets/js/site.js
          fi
          
          # Clean up temporary files
          rm -rf web/out
          
          # List contents for debugging
          echo "📁 docs/ directory contents:"
          ls -la docs/
          echo "📁 docs/_next/ directory contents:"
          ls -la docs/_next/ || echo "No _next directory found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs'

  deploy:
    # Only deploy on push to main; PRs run the build job for validation only
    # (GitHub Pages environment protection rejects deploys from PR refs).
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5